<!DOCTYPE html>
<html>

<head>

<title>Employee Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="col-md-4 mx-auto">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4>Employee Login</h4>

</div>

<div class="card-body">

<form method="POST">

<label>Employee ID</label>

<input
type="text"
name="employee_id"
class="form-control"
required>

<br>

<label>Passcode</label>

<input
type="password"
name="passcode"
class="form-control"
required>

<br>

<button class="btn btn-primary w-100">

LOGIN

</button>

<hr>

<div id="uploadStatus" class="mt-3">

    <div id="statusCard" class="alert alert-info">

        <div id="lastUpload"></div>

    </div>

    <div id="progressSection" style="display:none;">

        <h6>DTR Upload Status</h6>

        <div class="progress">

            <div
                id="progressBar"
                class="progress-bar progress-bar-striped progress-bar-animated"
                style="width:0%">

                0%

            </div>

        </div>

        <small
            id="employeeName"
            class="d-block mt-2">

        </small>

        <small
            id="completed"
            class="d-block">

        </small>

    </div>

</div>

</form>

</div>

</div>

</div>

</div>
<script>

async function loadUploadStatus() {

    try {

        const response = await fetch("/api/upload-status");
        const data = await response.json();

        const statusCard = document.getElementById("statusCard");
        const progressSection = document.getElementById("progressSection");
        const lastUpload = document.getElementById("lastUpload");

        const progressBar = document.getElementById("progressBar");
        const employeeName = document.getElementById("employeeName");
        const completed = document.getElementById("completed");

        // ===============================
        // UPLOAD CURRENTLY RUNNING
        // ===============================
        if (data.running === true) {

            statusCard.style.display = "none";
            progressSection.style.display = "block";

            progressBar.style.width = data.progress + "%";
            progressBar.innerHTML = data.progress + "%";

            employeeName.innerHTML =
                "<strong>Uploading:</strong> " + data.current_employee;

            completed.innerHTML =
                "Completed: " + data.completed + " / " + data.total;

            return;
        }

        // ===============================
        // NO LONGER RUNNING
        // ===============================
        progressSection.style.display = "none";
        statusCard.style.display = "block";

        // ===============================
        // FINISHED
        // ===============================
        if (data.finished === true) {

            statusCard.className = "alert alert-success";

            lastUpload.innerHTML = `
                <h6>✅ Successfully Uploaded</h6>

                <hr>

                <strong>${data.month}</strong><br>

                ${data.total} Employee Records Uploaded
            `;

        }

        // ===============================
        // SYSTEM READY
        // ===============================
        else {

            statusCard.className = "alert alert-info";

            lastUpload.innerHTML = `
                <h6>🟢 System Ready</h6>

                Waiting for next DTR upload...
            `;

        }

    }

    catch(error){

        console.log(error);

    }

}

loadUploadStatus();

setInterval(loadUploadStatus,1000);

</script>
</body>

</html>
