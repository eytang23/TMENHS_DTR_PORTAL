{% extends "admin/layout.html" %}

{% block content %}

<h2 class="mb-4">

    👥 Employee Accounts

</h2>

<!-- Summary Card -->

<div class="row mb-4">

    <div class="col-md-3">

        <div class="card shadow">

            <div class="card-body text-center">

                <h2>{{ employees|length }}</h2>

                <small>Total Employees</small>

            </div>

        </div>

    </div>

</div>

<!-- Search -->

<div class="card shadow mb-4">

    <div class="card-body">

        <form method="GET">

            <div class="row">

                <div class="col-md-8">

                    <input
                        type="text"
                        name="search"
                        class="form-control"
                        placeholder="Search Employee ID or Name">

                </div>

                <div class="col-md-2">

                    <button
                        class="btn btn-primary w-100">

                        🔍 Search

                    </button>

                </div>

                <div class="col-md-2">

                    <a
                        href="{{ url_for('employee_accounts') }}"
                        class="btn btn-secondary w-100">

                        Show All

                    </a>

                </div>

            </div>

        </form>

    </div>

</div>

<!-- Employee Table -->

<div class="card shadow">

    <div class="card-body">

        <table class="table table-hover">

            <thead class="table-primary">

                <tr>

                    <th>Employee ID</th>

                    <th>Employee Name</th>

                    <th width="220">

                        Actions

                    </th>

                </tr>

            </thead>

            <tbody>

            {% for emp in employees %}

                <tr>

                    <td>{{ emp.employee_id }}</td>

                    <td>{{ emp.name }}</td>

                    <td>

                        <button
                            class="btn btn-info btn-sm">

                            👁 View

                        </button>

                        <button
                            class="btn btn-warning btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#resetPasswordModal"
                            data-id="{{ emp.employee_id }}"
                            data-name="{{ emp.name }}">

                            🔑 Reset Password

                        </button>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
<!-- ===========================
Reset Password Modal
=========================== -->

<div
    class="modal fade"
    id="resetPasswordModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header bg-warning">

                <h5 class="modal-title">

                    🔑 Reset Employee Password

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <form
                id="resetPasswordForm"
                method="POST">

                <div class="modal-body">

                    <p>

                        Employee:

                    </p>

                    <h5 id="employeeName"></h5>

                    <input
                        type="hidden"
                        id="employeeId"
                        name="employee_id">

                    <hr>

                    <label>

                        New Password

                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="new_password"
                        required>

                    <br>

                    <label>

                        Confirm Password

                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="confirm_password"
                        required>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                        type="button">

                        Cancel

                    </button>

                    <button
                        class="btn btn-warning"
                        type="submit">

                        🔑 Reset Password

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
<script>

const resetModal =
document.getElementById("resetPasswordModal");

resetModal.addEventListener(
    "show.bs.modal",
    function(event){

        const button =
        event.relatedTarget;

        const employeeId =
        button.getAttribute("data-id");

        const employeeName =
        button.getAttribute("data-name");

        document.getElementById(
            "employeeId"
        ).value = employeeId;

        document.getElementById(
            "employeeName"
        ).innerHTML =
        employeeName;

        document.getElementById(
            "resetPasswordForm"
        ).action =
        "/admin/reset-password/" +
        employeeId;

    }

);

</script>
