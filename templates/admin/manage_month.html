{% extends "admin/layout.html" %}

{% block content %}

<h2 class="mb-4">
    📁 Manage DTR Month
</h2>

<div class="card shadow">

    <div class="card-body">

        <h4>

            {{ month }}

        </h4>

        <hr>

        <p>

            <strong>Total Employee Records:</strong>

            {{ total_records }}

        </p>

        <form
            action="{{ url_for('delete_month', month=month) }}"
            method="POST"
            onsubmit="return confirmDelete();"
            style="display:inline;">

            <button
                type="submit"
                class="btn btn-danger">

                🗑 Delete Month

            </button>

        </form>

        <a
            href="{{ url_for('dtr_management') }}"
            class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

{% endblock %}
<script>

function confirmDelete() {

    return confirm(
        "⚠ WARNING\n\n" +
        "You are about to permanently delete\n\n" +
        "{{ month }}\n\n" +
        "This action cannot be undone.\n\n" +
        "Do you want to continue?"
    );

}

</script>
