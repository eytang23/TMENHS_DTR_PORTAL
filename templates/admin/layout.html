<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TMENHS Admin Panel</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<style>

body{

    background:#f4f6f9;

}

.sidebar{

    width:250px;

    height:100vh;

    position:fixed;

    background:#0d6efd;

    color:white;

}

.sidebar h4{

    padding:20px;

    text-align:center;

    border-bottom:1px solid rgba(255,255,255,.2);

}

.sidebar a{

    color:white;

    text-decoration:none;

    display:block;

    padding:15px 20px;

}

.sidebar a:hover{

    background:rgba(255,255,255,.15);

}

.content{

    margin-left:250px;

    padding:30px;

}

.card{

    border:none;

    border-radius:12px;

}

</style>

</head>

<body>

<div class="sidebar">

<h4>

TMENHS

<br>

DTR SYSTEM

</h4>

<a href="/admin/dashboard">

<i class="bi bi-house"></i>

Dashboard

</a>

<a href="{{ url_for('dtr_management') }}">

<i class="bi bi-folder2-open"></i>

DTR Management

</a>

<a href="#">

<i class="bi bi-people"></i>

Employee Accounts

</a>

<a href="#">

<i class="bi bi-clock-history"></i>

Upload History

</a>

<a href="/logout">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

</div>

<div class="content">

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</div>

</body>

</html>
